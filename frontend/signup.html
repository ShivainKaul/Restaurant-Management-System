<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="./signup.css">
    <title> Sign UP</title>
  </head>
  <body>
    <main>
      <section id="logo_side" class="logoside">
        <div id="img_rect" class="logobox">
          <img src="./assets/balochlogo.png" alt="OUR LOGO">
        </div>
      </section>
      <section id="form_side">
        <div class="card">
          <h1>CREATE YOUR ACCOUNT</h1>
          <p>Start managing food outlets today</p>
        </div>
        <form>
          <!--- Business info -->
          <div id="b_info" class="card">
            <div id="b_info_head" class="section_header">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" > <path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7" ></path> <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path> <path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"></path> <path d="M2 7h20"></path> <path d="M22 7v3a2 2 0 0 1-2 2a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12a2 2 0 0 1-2-2V7" ></path> </svg>
              <h3>Business Information</h3>
            </div>
            <div class="input_field">
              <label for="bname">Business Name</label>
              <input type="text" id="bname" required>
            </div>
            <div class="input_field">
              <label for="business_type">Business Type</label>
              <select id="business_type">
                <option value="">Select a type</option>
                <option value="cafe">Cafe</option>
                <option value="bakery">Bakery</option>
                <option value="food_truck">Food Truck</option>
                <option value="family_res">Family Restaurant</option>
              </select>
            </div>
            <div class="input_field">
              <label for="no_ob">Number of Locations</label>
              <input type="number" id="no_ob" required>
            </div>
          </div>
          <!-- Owner information -->
          <div id="owner_info" class="card">
            <div id="o_info_head" class="section_header">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" > <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path> <circle cx="12" cy="7" r="4"></circle> </svg>
              <h3>Owner Information</h3>
            </div>
            <div class="input_field">
              <label for="fname">Full Name</label>
              <input type="text" id="fname" required>
            </div>
            <!-- This is supposed to be in same row thats why div use-->
            <div id="contact_info">
              <div class="input_field">
                <label for="email">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"></rect> <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" ></path> </svg>
                  Email
                </label>
                <input type="email" id="email" required>
              </div>
              <div class="input_field">
                <label for="phone_no">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" > <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" ></path> </svg>
                  Phone No
                </label>
                <input id="phone_no" type="tel" required>
              </div>
            </div>
          </div>
          <!---Business Location-->
          <div id="business_loc" class="card">
            <div id="bloc_head" class="section_header">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" > <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0" ></path> <circle cx="12" cy="10" r="3"></circle> </svg>
              <h3>Business Location</h3>
            </div>
            <div class="input_field">
              <label for="add">Address</label>
              <input id="add" type="text" required>
            </div>
            <div id="address_details">
              <div id="city_col" class="input_field">
                <label for="city">City</label>
                <input id="city" type="text" required>
              </div>
              <div id="state_col" class="input_field">
                <label for="state">State</label>
                <input id="state" type="text" required>
              </div>
              <div id="pcode_col" class="input_field">
                <label for="pincode">Pincode</label>
                <input id="pincode" type="text" required>
              </div>
            </div>
          </div>
          <!---security information-->
          <div id="security_info" class="card">
            <div id="sec_head" class="section_header">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" > <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect> <path d="M7 11V7a5 5 0 0 1 10 0v4"></path> </svg>
              <h3>Security</h3>
            </div>
            <div class="input_field">
              <label for="uname">Username</label>
              <input id="uname" type="text" required>
            </div>
            <div class="input_field">
              <label for="passwd">Password</label>
              <input id="passwd" type="password" required>
            </div>
            <div class="input_field">
              <label for="cnf_passwd">Confirm Password</label>
              <div id="cnf_pass_col" class="password-wrapper">
                <input id="cnf_passwd" type="password" required>

                <button type="button" id="reveal">
                  <svg id="eye_svg" width="35px" height="35px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"> <path d="M4.71 3.29a1 1 0 0 0-1.42 1.42l5.63 5.63a3.5 3.5 0 0 0 4.74 4.74l5.63 5.63a1 1 0 0 0 1.42 0 1 1 0 0 0 0-1.42zM12 13.5a1.5 1.5 0 0 1-1.5-1.5v-.07l1.56 1.56z" fill="currentColor"/> <path d="M12.22 17c-4.3.1-7.12-3.59-8-5a13.7 13.7 0 0 1 2.24-2.72L5 7.87a15.89 15.89 0 0 0-2.87 3.63 1 1 0 0 0 0 1c.63 1.09 4 6.5 9.89 6.5h.25a9.48 9.48 0 0 0 3.23-.67l-1.58-1.58a7.74 7.74 0 0 1-1.7.25z" fill="currentColor"/> <path d="M21.87 11.5c-.64-1.11-4.17-6.68-10.14-6.5a9.48 9.48 0 0 0-3.23.67l1.58 1.58a7.74 7.74 0 0 1 1.7-.25c4.29-.11 7.11 3.59 8 5a13.7 13.7 0 0 1-2.29 2.72L19 16.13a15.89 15.89 0 0 0 2.91-3.63 1 1 0 0 0-.04-1z" fill="currentColor"/>
                  </svg>
                </button>
              </div>
            </div>
            <div id="check_col">
              <input id="agree_check" type="checkbox" required>
              <label for="agree_check">I agree to the Terms of Services and Privacy Policy</label>
            </div>
          </div>
          <button id="submit" class="btn-main">Create Account</button>
        </form>
        <p>Already have an account? <a href="./login.html">Log in</a></p>
      </section>
    </main>
    <footer>
      Ye kaisa hai ?
    </footer>
    <script src="./signup.js"></script>
  </body>
</html>

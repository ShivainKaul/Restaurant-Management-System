<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <main>
    <div class="leftbrandside">
      <div class="logobox">
        <img src="./assests/balochlogo.png" alt="not found">
      </div>
    </div>
    <div class="loginsection">
      <div class="loginbox">
        <h1 id="hello" style="color: rgb(179, 107, 129);">Hello !</h1>

        <p id="signinmsg">Sign Up to get Started</p>

        <input id="email" type="text" placeholder="Email Address" />
        <br>
        <input id="password"type="password" placeholder="Password" />
        <br>
        <button>
          Login
        </button>
        <br>
        <br>
        
        <a id="forgot" href="https://youtu.be/dQw4w9WgXcQ?si=a6Xg2uOfhehh3cMK">Forgot Password</a>

        <p id="dontmsg">Don't have an account? <a id="signin" href="signup.html">Sign in</a></p>
        
      </div>
    </div>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
  </head>
  <body>
    <main>
      <section id="leftbrandside">
        <div class="logobox">
          <img src="./assets/balochlogo.png" alt="not found">
        </div>
      </section>
      <section id="loginsection">
        <div class="loginbox">
          <h1 id="hello" style="color: rgb(179, 107, 129);">Hello !</h1>
          <form>
            <p id="signinmsg">Log in to get Started</p>
            <input id="uname" type="text" placeholder="Username" required/>
            <div id="passwd_col">
              <input id="password"type="password" placeholder="Password" required/>
              <button type="button" id="reveal">
                <svg id="eye_svg" width="35px" height="35px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"> <path d="M4.71 3.29a1 1 0 0 0-1.42 1.42l5.63 5.63a3.5 3.5 0 0 0 4.74 4.74l5.63 5.63a1 1 0 0 0 1.42 0 1 1 0 0 0 0-1.42zM12 13.5a1.5 1.5 0 0 1-1.5-1.5v-.07l1.56 1.56z" fill="currentColor"/> <path d="M12.22 17c-4.3.1-7.12-3.59-8-5a13.7 13.7 0 0 1 2.24-2.72L5 7.87a15.89 15.89 0 0 0-2.87 3.63 1 1 0 0 0 0 1c.63 1.09 4 6.5 9.89 6.5h.25a9.48 9.48 0 0 0 3.23-.67l-1.58-1.58a7.74 7.74 0 0 1-1.7.25z" fill="currentColor"/> <path d="M21.87 11.5c-.64-1.11-4.17-6.68-10.14-6.5a9.48 9.48 0 0 0-3.23.67l1.58 1.58a7.74 7.74 0 0 1 1.7-.25c4.29-.11 7.11 3.59 8 5a13.7 13.7 0 0 1-2.29 2.72L19 16.13a15.89 15.89 0 0 0 2.91-3.63 1 1 0 0 0-.04-1z" fill="currentColor"/>
                </svg>
              </button>
            </div>
            <button id="submit">Login</button>
            <p id="forget_password"><a id="forgot" href="https://youtu.be/dQw4w9WgXcQ?si=a6Xg2uOfhehh3cMK">Forgot Password</a></p>
            <p id="dontmsg">Don't have an account? <a id="signin" href="signup.html">Sign in</a></p>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
